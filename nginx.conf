server {
  listen 8703;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy for BSP APIs to avoid browser-side CORS.
  location /api-proxy/ {
    proxy_pass https://bspapp.sail-bhilaisteel.com/;
    proxy_set_header Host bspapp.sail-bhilaisteel.com;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
